name: ERP Solution CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Run Unit Tests
      run: dotnet test --filter "Category=Unit" --no-build --verbosity normal

    - name: Run Integration Tests
      env:
        TESTCONTAINERS_RYUK_DISABLED: true
      run: dotnet test --filter "Category=Integration" --no-build --verbosity normal

    - name: Publish API
      run: dotnet publish src/ErpShowroom.API/ErpShowroom.API.csproj -c Release -o ./publish/api --no-build

    - name: Publish Blazor WASM
      run: dotnet publish src/ErpShowroom.Client/ErpShowroom.Client.csproj -c Release -o ./publish/blazor --no-build

    - name: Upload API Artifact
      uses: actions/upload-artifact@v4
      with:
        name: api-publish
        path: ./publish/api

    - name: Upload Blazor Artifact
      uses: actions/upload-artifact@v4
      with:
        name: blazor-publish
        path: ./publish/blazor
